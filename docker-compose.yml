services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmsx-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      STORAGE_ROOT: /app/storage
      VMS_STORAGE_ROOT: /app/storage
      DATABASE_URL: sqlite+aiosqlite:////app/storage/database/vmsx.db
      YOLO_MODEL_PATH: /app/storage/models/skysealand_yolo12m_best.onnx
      SKYDET_MODEL_PATH: /app/storage/models/skydet_skysealand_best.pt
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200,http://localhost,http://127.0.0.1
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vmsx-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vmsx-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vmsx-net

networks:
  vmsx-net:
    driver: bridge
